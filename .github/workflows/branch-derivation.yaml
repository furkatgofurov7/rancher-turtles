name: Test branch derivation

on:
  workflow_dispatch:
    inputs:
      rancher_ref:
        description: "rancher/rancher branch. Use 'auto' to derive from current branch."
        required: true
        default: "auto"
      charts_ref:
        description: "rancher/charts branch. Use 'auto' to derive from current branch."
        required: true
        default: "auto"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve rancher_ref
        run: |
          INPUT="${{ github.event.inputs.rancher_ref }}"
          if [ "${INPUT}" != "auto" ]; then
            echo "RANCHER_REF=${INPUT}" >> $GITHUB_ENV
            echo "Using explicit rancher_ref: ${INPUT}"
          else
            TURTLES_BRANCH="${{ github.ref_name }}"
            if [[ "$TURTLES_BRANCH" =~ ^release/v0\.([0-9]+)$ ]]; then
              TURTLES_MINOR="${BASH_REMATCH[1]}"
              RANCHER_MINOR=$(( TURTLES_MINOR - 12 ))
              echo "RANCHER_REF=release/v2.${RANCHER_MINOR}" >> $GITHUB_ENV
              echo "Derived rancher_ref: release/v2.${RANCHER_MINOR} from ${TURTLES_BRANCH}"
            else
              echo "ERROR: Cannot derive rancher_ref from branch '${TURTLES_BRANCH}'. Please provide an explicit value."
              exit 1
            fi
          fi

      - name: Resolve charts_ref
        run: |
          INPUT="${{ github.event.inputs.charts_ref }}"
          if [ "${INPUT}" != "auto" ]; then
            echo "CHARTS_REF=${INPUT}" >> $GITHUB_ENV
            echo "Using explicit charts_ref: ${INPUT}"
          else
            TURTLES_BRANCH="${{ github.ref_name }}"
            if [[ "$TURTLES_BRANCH" =~ ^release/v0\.([0-9]+)$ ]]; then
              TURTLES_MINOR="${BASH_REMATCH[1]}"
              RANCHER_MINOR=$(( TURTLES_MINOR - 12 ))
              echo "CHARTS_REF=dev-v2.${RANCHER_MINOR}" >> $GITHUB_ENV
              echo "Derived charts_ref: dev-v2.${RANCHER_MINOR} from ${TURTLES_BRANCH}"
            else
              echo "ERROR: Cannot derive charts_ref from branch '${TURTLES_BRANCH}'. Please provide an explicit value."
              exit 1
            fi
          fi

      - name: Print results
        run: |
          echo "RANCHER_REF=${{ env.RANCHER_REF }}"
          echo "CHARTS_REF=${{ env.CHARTS_REF }}"