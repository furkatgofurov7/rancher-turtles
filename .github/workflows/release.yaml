name: Turtles release

on:
  push:
    tags:
      - "v*-test"
  workflow_dispatch:

permissions:
  contents: write # to create releases
  id-token: write # to read vault secrets
  packages: write # to push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - platform: linux/amd64
          tag-suffix: "linux-amd64"
        - platform: linux/arm64
          tag-suffix: "linux-arm64"
    env:
      TAG: ${{ github.ref_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set test credentials
      run: |
        echo "DOCKER_USERNAME=furkat007" >> $GITHUB_ENV
        echo "DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}" >> $GITHUB_ENV
        echo "STAGE_REGISTRY=ghcr.io" >> $GITHUB_ENV
        echo "STAGE_REGISTRY_USERNAME=furkatgofurov7" >> $GITHUB_ENV
        echo "STAGE_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
        echo "PRIME_REGISTRY=ghcr.io" >> $GITHUB_ENV

    - name: Push community image to DockerHub
      uses: rancher/ecm-distro-tools/actions/publish-image@5d6e63896fea85836b2fca6dfb9236bcefe2aaa5
      with:
        image: turtles
        tag: ${{ env.TAG }}-${{ matrix.tag-suffix }}
        platforms: ${{ matrix.platform }}
        push-to-prime: false
        public-repo: furkat007
        public-username: ${{ env.DOCKER_USERNAME }}
        public-password: ${{ env.DOCKER_PASSWORD }}
        make-target: push-image

    - name: Push prime image to staging registry
      uses: rancher/ecm-distro-tools/actions/publish-image@5d6e63896fea85836b2fca6dfb9236bcefe2aaa5
      with:
        image: turtles
        tag: ${{ env.TAG }}-${{ matrix.tag-suffix }}
        platforms: ${{ matrix.platform }}
        push-to-public: false
        prime-repo: furkatgofurov7
        identity-registry: ${{ env.PRIME_REGISTRY }}
        prime-registry: ${{ env.STAGE_REGISTRY }}
        prime-username: ${{ env.STAGE_REGISTRY_USERNAME }}
        prime-password: ${{ env.STAGE_REGISTRY_PASSWORD }}
        prime-make-target: push-prime-image

  merge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - image-type: community
        - image-type: prime
    env:
      TAG: ${{ github.ref_name }}
    needs:
    - release
    steps:
    - name: Set test credentials
      run: |
        echo "DOCKER_USERNAME=furkat007" >> $GITHUB_ENV
        echo "DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}" >> $GITHUB_ENV
        echo "STAGE_REGISTRY=ghcr.io" >> $GITHUB_ENV
        echo "STAGE_REGISTRY_USERNAME=furkatgofurov7" >> $GITHUB_ENV
        echo "STAGE_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
        echo "PRIME_REGISTRY=ghcr.io" >> $GITHUB_ENV

    - name: Log into Docker Hub registry
      if: ${{ matrix.image-type == 'community' }}
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Log into Staging registry
      if: ${{ matrix.image-type == 'prime' }}
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ env.STAGE_REGISTRY_USERNAME }}
        password: ${{ env.STAGE_REGISTRY_PASSWORD }}
        registry: ${{ env.STAGE_REGISTRY }}

    - name: Create multi-platform image and push
      shell: bash
      run: |
        if [ "${{ matrix.image-type }}" = "community" ]; then
          IMAGE="turtles"
          URL="docker.io/furkat007/${IMAGE}:${{ env.TAG }}"
          docker buildx imagetools create -t "${URL}" \
            "${URL}-linux-amd64" \
            "${URL}-linux-arm64"
          echo "Pushed multi-platform image: ${URL}"
        elif [ "${{ matrix.image-type }}" = "prime" ]; then
          IMAGE="turtles"
          URL="${{ env.STAGE_REGISTRY }}/furkatgofurov7/${IMAGE}:${{ env.TAG }}"
          docker buildx imagetools create -t "${URL}" \
            "${URL}-linux-amd64" \
            "${URL}-linux-arm64"
          echo "Pushed multi-platform image: ${URL}"

          docker pull ${URL}
          IMAGE_DIGEST=$( docker inspect --format='{{index .RepoDigests 0}}' ${URL} | sed 's/.*@//' )
          MULTI_PLATFORM_IMAGE="${{ env.STAGE_REGISTRY }}/furkatgofurov7/${IMAGE}@${IMAGE_DIGEST}"
          echo "MULTI_PLATFORM_IMAGE"=${MULTI_PLATFORM_IMAGE} >> "$GITHUB_ENV"

          MULTI_PLATFORM_IMAGE_TAG="${{ env.STAGE_REGISTRY }}/furkatgofurov7/${IMAGE}:${{ env.TAG }}@${IMAGE_DIGEST}"
          echo "MULTI_PLATFORM_IMAGE_TAG"=${MULTI_PLATFORM_IMAGE_TAG} >> "$GITHUB_ENV"
        fi

    - name: Install Cosign
      if: ${{ matrix.image-type == 'prime' }}
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Install slsactl
      if: ${{ matrix.image-type == 'prime' }}
      uses: rancherlabs/slsactl/actions/install-slsactl@3c6d1c0351b2edae98b6305c41772084a267848b # v0.1.30

    - name: Sign multi-platform image
      shell: bash
      if: ${{ matrix.image-type == 'prime' }}
      run: |
        cosign sign \
          --oidc-provider=github-actions \
          --yes \
          --sign-container-identity="${{ env.PRIME_REGISTRY }}/furkatgofurov7/turtles" \
          "${MULTI_PLATFORM_IMAGE}"

    - name: Attest provenance
      shell: bash
      if: ${{ matrix.image-type == 'prime' }}
      run: |
        max_retries=3
        retry_delay=5
        i=0

        while [ "${i}" -lt "${max_retries}" ]; do
            if slsactl download provenance --format=slsav1 "${MULTI_PLATFORM_IMAGE_TAG}" > provenance-slsav1.json; then
                break
            fi
            if [ "${i}" -eq "$(( max_retries - 1 ))" ]; then
                echo "ERROR: Failed to generate slsav1 provenance. Check whether the image is present in the Prime registry."
                exit 1
            fi
            i=$(( i + 1 ))
            sleep "${retry_delay}"
        done

        cat provenance-slsav1.json
        cosign attest --yes --predicate provenance-slsav1.json --type slsaprovenance1 "${MULTI_PLATFORM_IMAGE}"

  chart-release:
    name: Helm chart release
    uses: ./.github/workflows/chart-release.yml
    needs:
    - merge
    with:
      tag: ${{ github.ref_name }}
      org: furkat007
      image: turtles
    secrets: inherit